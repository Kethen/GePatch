name: Build package

on: [ push, pull_request, workflow_dispatch ]

jobs:
  build_pkg:
    runs-on: ubuntu-24.04
    steps:

    - name: Checkout
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set env vars
      run: |
        echo "sha_name=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_ENV
        echo "PSPDEV_TAG=ghcr.io/pspdev/pspdev:v20260201" >> $GITHUB_ENV

    - name: Build
      run: |
        docker run --rm -i -v ./:/work_dir -w /work_dir "$PSPDEV_TAG" make
        mkdir -p PSP/SEPLUGINS
        mv ge_patch.prx PSP/SEPLUGINS/

    - name: Push package artifact
      uses: actions/upload-artifact@v4
      with:
        name: gepatch_${{ env.sha_name }}
        path: |
           LICENSE.TXT
           PSP/SEPLUGINS/ge_patch.prx
        if-no-files-found: error
